<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensagem enviada | ALFA Web & Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root{
      --bg:#050209;
      --card:rgba(255,255,255,.07);
      --purple:#b937ff;
      --purple-2:#7b2cff;
      --text:#ffffff;
      --muted:#c9bdd7;
      --border:rgba(185,55,255,.32);
      --glow:0 0 35px rgba(185,55,255,.45);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:Inter,system-ui,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 18% 18%, rgba(185,55,255,.34), transparent 34%),
        radial-gradient(circle at 82% 76%, rgba(123,44,255,.24), transparent 32%),
        linear-gradient(180deg,#12051d 0%,var(--bg) 58%,#030105 100%);
      display:grid;
      place-items:center;
      overflow:hidden;
      padding:28px;
    }
    body::before{
      content:'';
      position:fixed;
      inset:0;
      background-image:linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px, transparent 1px);
      background-size:58px 58px;
      mask-image:radial-gradient(circle at center,#000,transparent 78%);
      pointer-events:none;
    }
    .orb{
      position:fixed;
      width:360px;
      height:360px;
      border:1px solid rgba(185,55,255,.25);
      border-radius:50%;
      pointer-events:none;
    }
    .orb.one{top:-90px;left:-80px}
    .orb.two{right:-120px;bottom:-130px}
    .card{
      width:min(760px,100%);
      position:relative;
      z-index:1;
      padding:54px 34px;
      text-align:center;
      border-radius:34px;
      background:linear-gradient(135deg,rgba(255,255,255,.09),rgba(255,255,255,.035));
      border:1px solid var(--border);
      box-shadow:0 25px 90px rgba(0,0,0,.45), var(--glow);
      backdrop-filter:blur(18px);
    }
    .icon{
      width:78px;
      height:78px;
      margin:0 auto 24px;
      border-radius:24px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,var(--purple),var(--purple-2));
      box-shadow:var(--glow);
      font-size:32px;
    }
    h1{
      font-family:Orbitron,sans-serif;
      font-size:clamp(34px,6vw,58px);
      line-height:1;
      text-transform:uppercase;
      margin-bottom:18px;
    }
    h1 span{color:var(--purple)}
    p{
      color:var(--muted);
      font-size:clamp(16px,2.8vw,20px);
      line-height:1.7;
      max-width:620px;
      margin:0 auto 30px;
    }
    .actions{display:flex;justify-content:center;gap:14px;flex-wrap:wrap}
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      min-height:54px;
      padding:0 24px;
      border-radius:999px;
      text-decoration:none;
      font-weight:900;
      color:#fff;
      border:1px solid rgba(255,255,255,.14);
    }
    .btn-primary{background:linear-gradient(135deg,var(--purple),var(--purple-2));box-shadow:var(--glow)}
    .btn-outline{background:rgba(255,255,255,.05)}
    .mini{margin-top:28px;font-size:13px;color:rgba(201,189,215,.82)}
    @media(max-width:560px){.card{padding:42px 22px;border-radius:26px}.btn{width:100%}}
  </style>
</head>
<body>
  <div class="orb one"></div>
  <div class="orb two"></div>
  <main class="card">
    <div class="icon"><i class="fa-solid fa-check"></i></div>
    <h1>Mensagem <span>enviada</span></h1>
    <p>Obrigado pelo contato! Sua mensagem foi enviada com sucesso. Em breve você receberá um retorno pelo e-mail informado no formulário.</p>
    <div class="actions">
      <a class="btn btn-primary" href="./"><i class="fa-solid fa-house"></i> Voltar ao site</a>
      <a class="btn btn-outline" href="./#contato"><i class="fa-solid fa-paper-plane"></i> Enviar outra mensagem</a>
    </div>
    <p class="mini">ALFA Web & Social · Produtos digitais, templates e soluções visuais.</p>
  </main>
</body>
</html>
